services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: aurorapm
      POSTGRES_USER: aurorapm
      POSTGRES_PASSWORD: aurorapm
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aurorapm -d aurorapm"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: ../infra/docker/Dockerfile.backend
    environment:
      PORT: 8080
      DATABASE_URL: jdbc:postgresql://postgres:5432/aurorapm
      DATABASE_USERNAME: aurorapm
      DATABASE_PASSWORD: aurorapm
      REDIS_HOST: redis
      REDIS_PORT: 6379
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_ACCESS_KEY: minioadmin
      STORAGE_SECRET_KEY: minioadmin
      STORAGE_BUCKET: aurorapm
      STORAGE_REGION: us-east-1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - "8080:8080"

  web:
    build:
      context: ./apps/web
      dockerfile: ../../infra/docker/Dockerfile.frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  postgres-data:
  minio-data:
