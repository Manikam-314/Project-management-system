server:
  port: ${PORT:8080}
  servlet:
    context-path: /

spring:
  application:
    name: aurorapm-api
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/aurorapm}
    username: ${DATABASE_USERNAME:aurorapm}
    password: ${DATABASE_PASSWORD:aurorapm}
    hikari:
      maximum-pool-size: 10
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha

aurorapm:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  security:
    jwt:
      secret: ${JWT_SECRET:aurorapm-dev-secret-key-change-me-in-production-32chars-minimum}
      issuer: aurorapm
      access-token-minutes: 15
    refresh-token-days: 7
    password-reset-hours: 1
    cookie:
      secure: ${COOKIE_SECURE:false}
  invitation:
    expiry-days: 7
  storage:
    endpoint: ${STORAGE_ENDPOINT:http://localhost:9000}
    access-key: ${STORAGE_ACCESS_KEY:minioadmin}
    secret-key: ${STORAGE_SECRET_KEY:minioadmin}
    bucket: ${STORAGE_BUCKET:aurorapm}
    region: ${STORAGE_REGION:us-east-1}

logging:
  level:
    com.aurorapm: INFO
    org.springframework.security: INFO
