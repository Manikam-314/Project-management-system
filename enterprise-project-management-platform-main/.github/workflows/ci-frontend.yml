name: CI Frontend

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "package.json"
      - ".github/workflows/ci-frontend.yml"
  pull_request:
    paths:
      - "apps/web/**"
      - "package.json"
      - ".github/workflows/ci-frontend.yml"

jobs:
  frontend:
    name: Frontend lint, test, and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm install
      - run: npm run lint
      - run: npm run test
      - run: npm run build
